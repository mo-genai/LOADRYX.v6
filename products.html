<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#02070D" />
  <title>المنتجات — LOADRYX</title>
  <meta name="description" content="جميع منتجات LOADRYX — باكجات PS5 AI، سكربتات Xim Matrix، خدمات Setting AI، والملحقات." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700;800;900&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="skip-link" href="#main">تخطّى إلى المحتوى</a>

  <main id="main">
    <section class="page-hero">
      <div class="page-hero__inner">
        <nav class="breadcrumbs" aria-label="مسار التصفّح">
          <a href="index.html">الرئيسية</a>
          <span class="breadcrumbs__sep">/</span>
          <span class="breadcrumbs__item--current">المنتجات</span>
        </nav>
        <h1 class="page-title">جميع <span class="text-blue">المنتجات.</span></h1>
        <p class="page-sub">تصفّح المتجر كاملاً — من باكجات الذكاء الاصطناعي للـ PS5 إلى السكربتات الاحترافية والملحقات.</p>
      </div>
    </section>

    <section class="section section--deep">
      <div class="section-inner">
        <div class="products-filter" data-products-filter-root>
          <button class="products-filter__toggle" type="button" aria-expanded="false" data-products-filter-toggle>
            <span>تصنيفات</span>
            <strong data-products-filter-label>جميع المنتجات</strong>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="square"/></svg>
          </button>
          <div class="products-filter__menu" data-products-filter-menu hidden>
            <button class="products-filter__option is-active" type="button" data-products-filter="all">جميع المنتجات</button>
            <button class="products-filter__option" type="button" data-products-filter="ps5">PS5 AI</button>
            <button class="products-filter__option" type="button" data-products-filter="setting">Setting AI</button>
            <button class="products-filter__option" type="button" data-products-filter="script">Script Xim Matrix</button>
            <button class="products-filter__option" type="button" data-products-filter="accessories">الملحقات</button>
          </div>
        </div>

        <div data-all-products></div>
      </div>
    </section>
  </main>

  <script src="data.js" defer></script>
  <script src="cart.js" defer></script>
  <script src="partials.js" defer></script>
  <script src="render.js" defer></script>
  <script src="script.js" defer></script>
  <script defer>
    document.addEventListener("DOMContentLoaded", () => {
      let initialized = false;
      const initFilters = () => {
        if (!window.LR_DATA) return setTimeout(initFilters, 30);

        const host = document.querySelector("[data-all-products]");
        const cards = host ? Array.from(host.querySelectorAll(".product-card")) : [];
        if (!host || cards.length === 0) return setTimeout(initFilters, 30);

        if (initialized) return;
        initialized = true;

        const filterRoot = document.querySelector("[data-products-filter-root]");
        const toggle = document.querySelector("[data-products-filter-toggle]");
        const menu = document.querySelector("[data-products-filter-menu]");
        const label = document.querySelector("[data-products-filter-label]");
        const tabs = document.querySelectorAll("[data-products-filter]");
        const filterNames = {
          all: "جميع المنتجات",
          ps5: "PS5 AI",
          setting: "Setting AI",
          script: "Script Xim Matrix",
          accessories: "الملحقات",
        };
        const closeMenu = () => {
          if (!menu || !toggle) return;
          menu.hidden = true;
          toggle.setAttribute("aria-expanded", "false");
        };
        const openMenu = () => {
          if (!menu || !toggle) return;
          menu.hidden = false;
          toggle.setAttribute("aria-expanded", "true");
        };
        const filterProducts = (cat) => {
          const activeCat = filterNames[cat] ? cat : "all";
          host.querySelectorAll(".product-card").forEach((card) => {
            const show = activeCat === "all" || card.getAttribute("data-product-cat") === activeCat;
            card.hidden = !show;
          });

          tabs.forEach((tab) => {
            tab.classList.toggle("is-active", tab.getAttribute("data-products-filter") === activeCat);
          });
          if (label) label.textContent = filterNames[activeCat];
        };

        if (toggle) {
          toggle.addEventListener("click", () => {
            if (!menu) return;
            menu.hidden ? openMenu() : closeMenu();
          });
        }

        tabs.forEach((tab) => {
          tab.addEventListener("click", (event) => {
            event.preventDefault();
            const cat = tab.getAttribute("data-products-filter") || "all";
            history.replaceState(null, "", cat === "all" ? "products.html" : "#" + cat);
            filterProducts(cat);
            closeMenu();
          });
        });

        document.addEventListener("click", (event) => {
          if (filterRoot && !filterRoot.contains(event.target)) closeMenu();
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") closeMenu();
        });

        const initialCat = location.hash ? location.hash.replace("#", "") : "all";
        filterProducts(initialCat);
      };

      initFilters();
    });
  </script>
</body>
</html>
